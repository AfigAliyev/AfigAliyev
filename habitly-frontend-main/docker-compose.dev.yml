# Development server overrides for habitly-frontend
networks:
  jetstrive-network:
    external: true

services:
  habitly-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: habitly-frontend-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=https://habitly-dev.jetstrive.com:8443
      - NEXT_PUBLIC_APP_URL=https://habitly-dev.jetstrive.com:8443
      - NEXT_PUBLIC_APP_ENV=dev
    volumes:
      - .:/app:delegated
      - /app/node_modules
      - /app/.next
    ports:
      - "3001:3000"  # Direct access for development server (prod uses 3000)
    networks:
      - jetstrive-network
    depends_on: [ ]  # Remove dependency for dev server
    labels:
      - "environment=dev"
      - "service=habitly-frontend"